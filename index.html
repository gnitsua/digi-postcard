<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digi Postcard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #ccc;
    color: #333;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    color: #222;
    padding: 8px 0;
  }

  .error-msg {
    display: none;
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    text-align: center;
  }

  .upload-area {
    border: 2px dashed #999;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .upload-area:active, .upload-area:hover {
    border-color: #888;
  }
  .upload-area p {
    font-size: 16px;
    color: #666;
  }
  .upload-area.has-image {
    display: none;
  }

  #fileInput {
    display: none;
  }

  .preview-wrapper {
    display: none;
    position: relative;
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }
  .preview-wrapper.visible {
    display: block;
  }
  .preview-wrapper canvas {
    width: 100%;
    height: auto;
    display: block;
  }

  .controls {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .controls.visible {
    display: flex;
  }

  label {
    font-size: 13px;
    color: #666;
    display: block;
    margin-bottom: 4px;
  }

  input[type="text"], input[type="datetime-local"], textarea {
    width: 100%;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid #aaa;
    border-radius: 8px;
    color: #333;
    font-size: 16px;
    font-family: inherit;
    outline: none;
  }
  input:focus, textarea:focus {
    border-color: #555;
  }
  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.4;
  }

  input[type="range"] {
    width: 100%;
    height: 36px;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 6px;
    background: #aaa;
    border-radius: 3px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #333;
    margin-top: -8px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:active { opacity: 0.7; }

  .btn-save {
    background: #333;
    color: #fff;
  }
  .btn-reset {
    background: #999;
    color: #fff;
    flex: 0.4;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Digi Postcard</h1>

  <div class="upload-area" id="uploadArea">
    <p>Tap to add a photo</p>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="error-msg" id="errorMsg"></div>
  <div class="preview-wrapper" id="previewWrapper">
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls" id="controls">
    <div class="field-group">
      <label>Zoom</label>
      <input type="range" id="zoomSlider" min="1" max="3" step="0.01" value="1">
    </div>
    <div class="field-group">
      <label>Horizontal Position</label>
      <input type="range" id="panXSlider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <div class="field-group">
      <label>Vertical Position</label>
      <input type="range" id="panYSlider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="field-group">
      <label>Date &amp; Time</label>
      <input type="datetime-local" id="dateInput">
    </div>

    <div class="field-group">
      <label>Location (one line per row)</label>
      <textarea id="locationInput" placeholder="160-0021&#10;Tokyo Shinjuku&#10;19-4, Kabukicho 1-Chōme&#10;Japan"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-reset" id="resetBtn">New</button>
      <button class="btn-save" id="saveBtn">Share Photo</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
<script>
const OUTPUT_WIDTH = 400;

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewWrapper = document.getElementById('previewWrapper');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const controls = document.getElementById('controls');
const dateInput = document.getElementById('dateInput');
const locationInput = document.getElementById('locationInput');
const GRAIN = 30 / 100;
const WARMTH = 15 / 100;
const zoomSlider = document.getElementById('zoomSlider');
const panXSlider = document.getElementById('panXSlider');
const panYSlider = document.getElementById('panYSlider');
const saveBtn = document.getElementById('saveBtn');
const resetBtn = document.getElementById('resetBtn');

let originalImage = null;
let renderQueued = false;
let imgZoom = 1;
let imgPanX = 0.5;
let imgPanY = 0.5;

function now() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

function toLocalIso(date) {
  const d = new Date(date);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

dateInput.value = now();

uploadArea.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const exif = await exifr.parse(file, { gps: true, exif: true });
    if (exif) {
      if (exif.DateTimeOriginal) {
        dateInput.value = toLocalIso(exif.DateTimeOriginal);
      }
      if (exif.latitude && exif.longitude) {
        reverseGeocode(exif.latitude, exif.longitude);
      }
    }
  } catch (err) {
    console.warn('EXIF parse failed:', err);
  }

  const img = new Image();
  img.onload = () => {
    originalImage = img;
    uploadArea.classList.add('has-image');
    previewWrapper.classList.add('visible');
    controls.classList.add('visible');
    queueRender();
  };
  img.src = URL.createObjectURL(file);
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function reverseGeocode(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1&zoom=18`,
      { headers: { 'Accept-Language': 'en' } }
    );
    if (res.status === 429) {
      showError('Rate limit reached. Please retry after a few seconds.');
      return;
    }
    if (!res.ok) {
      showError('Location lookup failed. Please retry after a few seconds.');
      return;
    }
    hideError();
    const data = await res.json();
    const a = data.address || {};
    const lines = [];
    const city = a.city || a.town || a.village || '';
    const district = a.suburb || a.neighbourhood || a.city_district || '';
    if (city && district) lines.push(`${city} ${district}`);
    else if (city) lines.push(city);
    const road = a.road || '';
    const number = a.house_number || '';
    if (road) lines.push(number ? `${number}, ${road}` : road);
    if (a.country) lines.push(a.country);
    locationInput.value = lines.join('\n');
    queueRender();
  } catch (err) {
    showError('Location lookup failed. Please retry after a few seconds.');
  }
}

function queueRender() {
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => {
    renderQueued = false;
    render();
  });
}

function render() {
  if (!originalImage) return;

  const BORDER = 2;
  const FRAME = 12;
  const INSET = BORDER + FRAME;

  const img = originalImage;
  const aspect = img.naturalHeight / img.naturalWidth;
  const photoW = OUTPUT_WIDTH - INSET * 2;
  const photoH = Math.round(photoW * aspect);
  const totalW = OUTPUT_WIDTH;
  const totalH = photoH + INSET * 2;

  canvas.width = totalW;
  canvas.height = totalH;

  // white background behind stripes
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, totalW, totalH);

  // diagonal stripes at 45 degrees
  drawStripes(totalW, totalH, BORDER);

  // 2px black outer border
  ctx.strokeStyle = '#000';
  ctx.lineWidth = BORDER * 2;
  ctx.strokeRect(0, 0, totalW, totalH);

  // photo area — render to offscreen canvas first for pixel manipulation
  const offCanvas = document.createElement('canvas');
  offCanvas.width = photoW;
  offCanvas.height = photoH;
  const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

  const zoom = imgZoom;
  const srcW = img.naturalWidth / zoom;
  const srcH = img.naturalHeight / zoom;
  const maxSx = img.naturalWidth - srcW;
  const maxSy = img.naturalHeight - srcH;
  const sx = maxSx * imgPanX;
  const sy = maxSy * imgPanY;
  offCtx.drawImage(img, sx, sy, srcW, srcH, 0, 0, photoW, photoH);

  const imageData = offCtx.getImageData(0, 0, photoW, photoH);
  const data = imageData.data;
  const grain = GRAIN;
  const warmth = WARMTH;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i + 1], b = data[i + 2];
    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
    gray = ((gray - 128) * 1.3) + 128;
    gray = gray * 0.92 + 20;
    r = Math.min(255, gray + warmth * 12);
    g = Math.min(255, gray + warmth * 4);
    b = Math.max(0, gray - warmth * 8);
    if (grain > 0) {
      const noise = (Math.random() - 0.5) * grain * 80;
      r = Math.min(255, Math.max(0, r + noise));
      g = Math.min(255, Math.max(0, g + noise));
      b = Math.min(255, Math.max(0, b + noise));
    }
    data[i] = r;
    data[i + 1] = g;
    data[i + 2] = b;
  }

  offCtx.putImageData(imageData, 0, 0);

  // vignette on offscreen
  const cx = photoW / 2, cy = photoH / 2;
  const maxR = Math.sqrt(cx * cx + cy * cy);
  const vigGrad = offCtx.createRadialGradient(cx, cy, maxR * 0.4, cx, cy, maxR);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.4)');
  offCtx.fillStyle = vigGrad;
  offCtx.fillRect(0, 0, photoW, photoH);

  // draw photo onto main canvas inside the frame
  ctx.drawImage(offCanvas, INSET, INSET);

  drawText(photoW, photoH, INSET);
}

function drawStripes(w, h, border) {
  const stripeW = 6;
  const colors = ['#555', '#fff'];
  ctx.save();
  ctx.beginPath();
  // clip to frame area (exclude photo center — that gets drawn over anyway)
  ctx.rect(border, border, w - border * 2, h - border * 2);
  ctx.clip();
  ctx.rotate(Math.PI / 4);
  const diag = Math.max(w, h) * 2;
  for (let x = -diag; x < diag; x += stripeW) {
    ctx.fillStyle = colors[((x / stripeW) & 1) ? 1 : 0];
    ctx.fillRect(x, -diag, stripeW, diag * 2);
  }
  ctx.restore();
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const month = months[d.getMonth()];
  const day = d.getDate();
  const year = d.getFullYear();
  let hours = d.getHours();
  const mins = String(d.getMinutes()).padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  return `${month} ${day}, ${year} at ${hours}:${mins} ${ampm}`;
}

function drawText(w, h, offset) {
  const fontSize = Math.round(w * 0.05);
  ctx.font = `500 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textBaseline = 'top';

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#000';

  const pad = Math.round(w * 0.04);
  const lineHeight = Math.round(fontSize * 1.4);

  const dateStr = formatDate(dateInput.value);
  if (dateStr) {
    ctx.textAlign = 'right';
    ctx.strokeText(dateStr, offset + w - pad, offset + pad);
    ctx.fillText(dateStr, offset + w - pad, offset + pad);
  }

  const locText = locationInput.value.trim();
  if (locText) {
    ctx.textAlign = 'left';
    const lines = locText.split('\n');
    const startY = offset + h - pad - (lines.length * lineHeight);
    lines.forEach((line, i) => {
      ctx.strokeText(line, offset + pad, startY + i * lineHeight);
      ctx.fillText(line, offset + pad, startY + i * lineHeight);
    });
  }
}

zoomSlider.addEventListener('input', () => {
  imgZoom = parseFloat(zoomSlider.value);
  queueRender();
});
panXSlider.addEventListener('input', () => {
  imgPanX = parseFloat(panXSlider.value);
  queueRender();
});
panYSlider.addEventListener('input', () => {
  imgPanY = parseFloat(panYSlider.value);
  queueRender();
});

[dateInput, locationInput].forEach(el =>
  el.addEventListener('input', queueRender)
);

saveBtn.addEventListener('click', () => {
  canvas.toBlob(async (blob) => {
    const file = new File([blob], 'postcard.jpg', { type: 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
      } catch (err) {
        if (err.name !== 'AbortError') console.warn('Share failed:', err);
      }
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'postcard.jpg';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  }, 'image/jpeg', 0.92);
});

resetBtn.addEventListener('click', () => {
  originalImage = null;
  uploadArea.classList.remove('has-image');
  previewWrapper.classList.remove('visible');
  controls.classList.remove('visible');
  fileInput.value = '';
  dateInput.value = now();
  locationInput.value = '';
  imgZoom = 1; imgPanX = 0.5; imgPanY = 0.5;
  zoomSlider.value = 1; panXSlider.value = 0.5; panYSlider.value = 0.5;
});
</script>
</body>
</html>
